name: roady_car
description: "electronic's ELECTRODECLIC CLUB smart car project able to evaluate and give a mark to a road it rides on ."
publish_to: 'Github'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Charts
  fl_chart: ^1.0.0
  syncfusion_flutter_charts: ^31.1.19

  # UI
  smooth_page_indicator: ^1.0.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  badges: ^3.0.0

  # Navigation / State
  provider: ^6.0.0

  # Network
  http: ^1.2.0
  url_launcher: ^6.1.0

  # Bluetooth
  flutter_blue_plus: ^1.10.0

  # Fichiers / Permissions
  csv: ^5.1.0
  path_provider: ^2.1.2
  permission_handler: ^11.3.1

  # Icônes launcher
  flutter_launcher_icons: ^0.14.3

  vector_math: any
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/img.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/menbre/